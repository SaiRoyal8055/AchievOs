<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registration Success</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fa;
}

.success-box {
    max-width: 600px;
    margin: 80px auto;
    padding: 40px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    text-align: center;
}

.success-icon {
    font-size: 60px;
    color: green;
}
</style>

</head>
<body>

<div class="success-box">

    <div class="success-icon">✔️</div>

    <h2 class="mt-3">Registration Successful 🎉</h2>

    <p class="mt-3">
        Thank you <b>{{ name }}</b> for registering.
    </p>

    <p>
        Your details have been successfully submitted.
    </p>

    <p>
        📧 A confirmation email has been sent to your registered email.
    </p>

    <p>
        📢 Further updates will be shared via Email & WhatsApp.
    </p>

    <hr>

    <!-- WhatsApp Join -->
    <a href="https://chat.whatsapp.com/YOUR_LINK_HERE" target="_blank" class="btn btn-success">
        Join WhatsApp Community
    </a>

    <br><br>

    <!-- Back to Home -->
    <a href="/" class="btn btn-primary">
        Back to Home
    </a>

</div>

</body>
</html>
